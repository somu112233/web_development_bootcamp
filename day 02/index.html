<form>
    <label for="name">Full Name:</label>
    <input type=" text" id="name" placeholder="Enter your name" required>

    <br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email" reuired>

    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter your password" required>
    <br><br>
    
    <label>GENDER:</label>
    <input type="radio" name="gender"> male
    <input type="radio" name="gender"> female
    <br><br>

    <label for="phone number">PHONE NUMBER:</label>
    <input type="tel" id="phone" placeholder="Enter your phone number" required>
    <br><br>

    <label for="date of birth">Date Of Birth:</label>
    <input type="date" id="date of birth" placeholder="Enter your date of birth" required>
    <br><br>

    <label for="age"> AGE:</label>
    <input type="number" id="age" placeholder="Enter your age" required>
    <br><br>
    

    <label>SKILLS:</label><br>

    <input type="checkbox" id="html" name="skills" value="HTML">
    <label for="html">HTML</label><br>
    
    <input type="checkbox" id="css" name="skills" value="CSS">
    <label for="css">CSS</label><br>

    <input type="checkbox" id="js" name="skills" value="Java Script">
    <label for="js">Java Script</label><br>
    <br><br>

    <label for="city">CITY:</label>
    <input type="text" id="city" placeholder="Enter your city" required>  
    <br><br>

    <label for="address">ADDRESS:</label><br>
    <textarea id="address" rows="4" cols="25"></textarea>
    <br><br>

    <label for="country">Country:</label>
    <select id="country" name="Country">
        <option value="">--Select Country---</option>
        <option value="india">India</option>
        <option value="usa">USA</option>
        <option value="uk">United Kingdom</option>
        <option value="canada">CANADA</option>
    </select>
    <br><br>

    <label for="comment">Comment</label>
    <textarea id="comment"></textarea>
    <br><br>

    <button type="submit">Submit:</button>
    <button type="reset">Reset:</button>
    <br><br>

</form>
