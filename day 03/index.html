<form>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name" required>
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email" required>
    <br><br> 

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter your password" required>
    <br><br>

    <label for="confirm-password">Confirm Password:</label>
    <input type="password" id="confirm-password" placeholder="Confirm your password" required>
    <br><br>

    <label for="phone-number">Phone Number:</label>
    <input type="tel" id="phone-number" placeholder="Enter your phone number" required>
    <br><br>

    <label for="date-of-birth">Date of Birth:</label>
    <input type="date" id="date-of-birth" required>
    <br><br>

    <label>Gender:</label>
    <input type="radio" name="gender">male
    <input type="radio" name="gender">female
    <br><br>

    <label for="hobbies">Hobbies:</label><br>
    <input type="checkbox" name="hobbies">Reading <br>
    <input type="checkbox" name="hobbies">travelling <br>
    <input type="checkbox" name="hobbies">sports <br>
    <br><br>

    <label>Country</label>
    <select name="country" id="country">
        <option value="india">India</option>
        <option value="usa">Usa</option>
        <option value="uk">United Kingdom</option>
        <option value="canada">Canada</option>
    </select>
    <br><br>

    <label for="address">Address:</label><br>
    <textarea id="address" rows="3" cols="15" required></textarea>
    <br><br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>
